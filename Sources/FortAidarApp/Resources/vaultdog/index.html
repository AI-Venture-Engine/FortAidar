<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultDog — Glass File Keeper</title>
  <script src="p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; background: transparent; }
    canvas { display: block; position: relative; z-index: 1; }
    #dogPortrait {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -52%);
      width: min(54vw, 560px);
      max-height: 82vh;
      object-fit: contain;
      z-index: 3;
      opacity: 0;
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.62)) drop-shadow(0 0 22px rgba(90,145,255,0.18));
      pointer-events: none;
      user-select: none;
    }
    body.dog-fallback #dogPortrait { opacity: 0.95; }
    #hud {
      position: fixed; top: 14px; right: 14px;
      padding: 14px 18px;
      background: rgba(10,12,25,0.7);
      border: 1px solid rgba(100,150,255,0.15);
      border-radius: 14px; backdrop-filter: blur(12px);
      color: rgba(180,200,255,0.6); font: 12px -apple-system, system-ui;
      text-align: center;
      z-index: 4;
    }
    #hud b { color: rgba(80,160,255,0.9); font-size: 24px; }
    .hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: rgba(150,170,255,0.26); font: 11px -apple-system; z-index: 4; }
  </style>
</head>
<body>
<img id="dogPortrait" src="dog_cutout.png" alt="VaultDog">
<div id="hud">🐕 <b id="fc">0</b><br><small>files guarded</small></div>
<div class="hint">drag orbit · scroll zoom · click deposit</div>
<script>
let dogImg, files = [], dust = [], fc = 0;
const DOG = 'dog_cutout.png';

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  textureMode(NORMAL);
  loadImage(
    DOG,
    img => {
      dogImg = img;
      document.body.classList.add('dog-texture-ready');
    },
    () => document.body.classList.add('dog-fallback')
  );
  for (let i = 0; i < 5; i++) addFile();
  for (let i = 0; i < 90; i++) dust.push({
    x: random(-300,300), y: random(-300,-40), z: random(-300,300),
    vx: random(-0.1,0.1), vy: random(-0.02,0.06), vz: random(-0.1,0.1),
    s: random(0.5,2), c: random(150,220)
  });
}

function addFile(fileName = 'file', fileType = 'document') {
  files.push({ a: random(TWO_PI), r: random(100,180), y: random(-280,-120),
    bp: random(TWO_PI), rs: random(0.002,0.007), t: floor(random(5)), sc: random(0.5,1) });
  fc++; document.getElementById('fc').textContent = fc;
}

window.vaultDogAddFile = function(fileName, fileType) {
  addFile(fileName || 'file', fileType || 'document');
};

function draw() {
  background(10, 11, 20);
  let br = sin(frameCount*0.035)*2;

  ambientLight(40, 42, 65);
  directionalLight(200, 195, 180, 0.4, 0.7, -0.5);
  pointLight(90, 120, 200, 0, -400, -150);
  pointLight(50, 70, 140, 220, -80, 200);

  orbitControl(0.4, 0.4, 0.04);

  // === GLASS PLATFORM — wireframe only, no solid fill ===
  push();
  translate(0, 50, 0);

  // Edge ring (bright)
  push();
  rotateX(HALF_PI);
  noFill();
  stroke(80, 145, 255, 90);
  strokeWeight(2.5);
  ellipse(0, 0, 280, 280);
  // Inner ring (dim)
  stroke(60, 110, 210, 35);
  strokeWeight(1);
  ellipse(0, 0, 255, 255);
  pop();

  // Radial grid lines
  push();
  rotateX(HALF_PI);
  noFill();
  stroke(50, 90, 170, 15);
  strokeWeight(0.4);
  for (let r = 25; r <= 125; r += 25) ellipse(0,0,r*2,r*2);
  for (let a = 0; a < TWO_PI; a += PI/8) {
    stroke(50, 90, 170, 10);
    line(cos(a)*18, sin(a)*18, cos(a)*138, sin(a)*138);
  }
  pop();

  // Soft glow halo beneath (flat transparent disc)
  push();
  rotateX(HALF_PI);
  noStroke();
  // Use fill with very low alpha — p5 respects this for flat shapes
  fill(40, 80, 160, 12);
  ellipse(0, 0, 270, 270);
  fill(50, 100, 200, 6);
  ellipse(0, 0, 320, 320);
  pop();

  pop(); // end platform

  // === DOG — textured 3D billboard above the glass platform ===
  if (dogImg && dogImg.width > 0) {
    push();
    translate(0, -105 + br, -10);
    noStroke();
    blendMode(BLEND);
    tint(255, 236);
    texture(dogImg);
    rotateX(0.1); // slight tilt toward viewer
    plane(390, 218);
    noTint();
    pop();
  }

  // === GLOW DISC under dog (projected on platform) ===
  push();
  translate(0, 45, 0);
  rotateX(HALF_PI);
  noStroke();
  fill(60, 110, 200, 15 + sin(frameCount*0.02)*5);
  ellipse(0, 0, 160, 160);
  fill(80, 140, 240, 6);
  ellipse(0, 0, 220, 220);
  pop();

  // === FLOATING FILES ===
  const FC = [[75,150,255],[80,190,120],[240,170,50],[180,110,245],[245,80,80]];
  for (let f of files) {
    push();
    let bob = sin(frameCount*0.016+f.bp)*6;
    let ang = f.a + frameCount*f.rs;
    translate(cos(ang)*f.r, f.y+bob, sin(ang)*f.r);
    rotateY(ang+HALF_PI);
    rotateX(sin(frameCount*0.01+f.bp)*0.08);
    scale(f.sc);
    let c = FC[f.t];
    noStroke();
    fill(c[0],c[1],c[2],180);
    box(10,14,3);
    if (f.t>=3) { push(); translate(0,0,2.2); fill(200,195,140); sphere(1.4,5,5); pop(); }
    pop();
  }

  // === DUST PARTICLES ===
  for (let p of dust) {
    p.x+=p.vx; p.y+=p.vy; p.z+=p.vz;
    if(p.x>340)p.x=-340; if(p.x<-340)p.x=340;
    if(p.y>-10)p.y=-300; if(p.y<-320)p.y=-40;
    if(p.z>340)p.z=-340; if(p.z<-340)p.z=340;
    push();
    translate(p.x,p.y,p.z);
    noStroke();
    fill(p.c*0.4, p.c*0.55, p.c, 40);
    sphere(p.s,4,4);
    pop();
  }
}

function mousePressed() { addFile('preview', 'click'); }
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
function keyPressed() { if(key==='s'||key==='S') saveCanvas('vaultdog','png'); }
</script>
</body>
</html>
